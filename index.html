<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoCoach Prototype</title>
  <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
  <header id="editorPanel">
    <button id="hidecontrolsbtn"></button>
  </header>

  <main>
    <section class="matchpanel">
      <article class="matchcontrols">
        <label>
          <select id="lang-switcher">
            <option value="en">EN</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
          </select>
          <button id="btn-toggle-mode">Roguelike</button>
          <button id="btn-init-match" disabled><span data-i18n="simulate">Simulate</span><span class="loader"></span></button>
        </label>
        <label>
          <span id="matchpercent">0</span><span>%</span>
          <button id="restartbutton" disabled style="display: none;" data-i18n="restart">Restart</button>
          <button id="pausebutton" disabled data-i18n="pause">Pause</button>
          <button id="btn-fast-forward">>></button>
        </label>

        <!-- Roguelike panel (hidden when not in roguelike mode) -->
        <div id="roguelike-panel" style="display:none">
          <div id="rogue-view-turn">
            <span id="rogue-turn-label"></span>
            <span id="rogue-record-label"></span>
            <span id="rogue-rules-label"></span>
            <button id="rogue-play-btn"></button>
          </div>
          <div id="rogue-view-result" style="display:none">
            <strong id="rogue-result-label"></strong>
            <span id="rogue-opponent-label"></span>
            <span data-i18n="rogue_distribute"></span>
            <button id="rogue-next-btn" data-i18n="rogue_next_btn"></button>
          </div>
          <div id="rogue-view-gameover" style="display:none">
            <strong data-i18n="rogue_game_over"></strong>
            <span id="rogue-final-record"></span>
            <button id="rogue-reset-btn" data-i18n="rogue_reset_btn"></button>
          </div>
        </div>
      </article>
      <canvas id="gameCanvas"></canvas>
      <article>
        <span id="teamascore">0</span>
        <span id="teamalabel" class="teamacolor"> Team A </span>
        <span id="teamblabel" class="teambcolor"> Team B </span>
        <span id="teambscore">0</span>
      </article>
    </section>

    <section class="matchpanel">
      <article class="matchinfo">
        <label>
          <span data-i18n="ball_label">Ball:</span><span id="ballteam"></span>
        </label>
        <fieldset id="log">
          <legend data-i18n="log_label">Log:</legend>
        </fieldset>
      </article>
    </section>
  </main>

  <!-- ============================= -->
  <!-- Templates Section -->
  <!-- ============================= -->

  <!-- Team Formation Template -->
  <template id="tpl-team-formation">
    <div class="team-formation">
      <div class="team-controls">
        <label>
          <p data-i18n="name_label">Name</p>
          <input class="team-name"></input>
          <div style="flex-grow: 2;"></div>
          <button class="btn-upload-team">
            <span class="team-message" style="display: none;"></span>
            <span data-i18n="upload_team">Upload Team</span>
          </button>
        </label>
        <label>
          <select class="team-selection"></select>
          <button class="btn-select-team"><span data-i18n="select_team">Select Team</span> <span class="loader"></span></button>
          <div style="flex-grow: 2;"></div>
          <button class="btn-change-team" data-i18n="other_team">Other team</button>
        </label>
        <label style="justify-content: space-between; display: none;">
          <button class="btn-export-team" data-i18n="export_team">Export Team</button>
          <input class="import-area"></input>
          <button class="btn-import-team" data-i18n="import_team">Import Team</button>
        </label>
      </div>
      <div class="players-wrapper"></div>
    </div>
  </template>

  <!-- Player Instruction Template -->
  <template id="tpl-player-instruction">
    <section class="player-instructions">
      <section>
        <label>
          <span class="player-name">Player</span>
        </label>
        <label>
          <button class="btn-tactic" data-i18n="tactic_button"></button>
          <div class="tactic-panel" style="display:none">
            <div class="tactic-panel-load">
              <select class="tactic-select"></select>
              <button class="btn-load-tactic" data-i18n="tactic_load"></button>
            </div>
            <div class="tactic-panel-save">
              <input class="tactic-name-input" type="text">
              <button class="btn-save-tactic" data-i18n="tactic_save"></button>
            </div>
          </div>
        </label>
        <label>
          <span class="reservedword" data-i18n="default_zone">DEFAULT ZONE</span>
          <input class="defaultzonex" type="number" min="0" max="100"></input>
          <span class="reservedword">%</span>
          <input class="defaultzoney" type="number" min="0" max="100"></input>
          <span class="reservedword">%</span>
        </label>
      </section>

      <section>
          <article class="myteamhasball">
            <span class="reservedword" data-i18n="while_keyword">WHILE </span><span class="fixed" data-i18n="team_has_ball"> Team has ball </span>
            <button class="btn-add-rule" data-i18n="add_rule">+ Add Rule</button>
            <hr>
            <div class="rules-container"></div>
            <span class="reservedword" data-i18n="default_keyword">DEFAULT </span><span class="defaultaction fixed"></span>
          </article>
          <article class="myteamdonthasball">
            <span class="reservedword" data-i18n="else_keyword">ELSE</span>
            <button class="btn-add-rule" data-i18n="add_rule">+ Add Rule</button>
            <hr>
            <div class="rules-container"></div>
            <span class="reservedword" data-i18n="default_keyword">DEFAULT </span><span class="defaultaction fixed"></span>
          </article>
      </section>

      <button class="btn-stats" data-i18n="stats_button">stats</button>
      <section class="player-stats-container">
        <article class="player-stats-grid">
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="scan_with_ball">Scan w/ ball</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="scanWithBall" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="scan_without_ball">Scan w/o ball</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="scanWithoutBall" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="max_speed">Max speed</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="maxSpeed" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="accuracy">Accuracy</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="accuracy" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="control">Control</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="control" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="reaction">Reaction</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="reaction" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="dribble">Dribble</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="dribble" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="strength">Strength</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="strength" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <label>
            <span class="stat-header">
              <span class="reservedword" data-i18n="endurance">Endurance</span>
              <output>0.5</output>
            </span>
            <div class="stat-input-container">
              <div class="locked-stat"></div>
              <input class="stat-input" data-stat="endurance" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>
          </label>
          <div class="stat-total-display"></div>
        </article>
      </section>
    </section>
  </template>

  <!-- Rule Item Template -->
  <template id="tpl-rule-item">
    <div class="rule-item">
      <button class="btn-up">▲</button>
      <span class="reservedword" data-i18n="if_keyword">IF</span>
      <select class="rule-condition"></select>
      <br />
      <button class="btn-down">▼</button>
      <span class="reservedword" data-i18n="then_keyword">THEN</span>
      <select class="rule-action"></select>
      <button class="btn-delete warning">✖</button>
    </div>
  </template>

  <!-- Log Item Template -->
  <template id="tpl-log-item">
    <div class="log-item">
      <span class="log-time"></span>
      <button class="log-btn">></button>
      <span class="log-team"></span>
      <span class="log-msg"></span>
    </div>
  </template>

  <!-- Team Summary Template -->
  <template id="tpl-team-summary-item">
    <fieldset class="team-summary-item">
      <legend data-i18n="team_label">Team</legend>
      <label>
        <span class="summary-possession-label summary-label" data-i18n="possession_label">Possession: </span>
        <span class="summary-possession-value">0 %</span>
        <div style="flex-grow: 2;"></div>
        <span class="summary-goals-label summary-label" data-i18n="goals_label">Goals: </span>
        <span class="summary-goals-value">0 %</span>
      </label>
    </fieldset>
  </template>

  <!-- Player Summary Template -->
  <template id="tpl-player-summary-item">
    <div class="player-summary-item">
      <span class="summary-name">Player</span>

      <label>
        <span class="summary-distance-label summary-label" data-i18n="distance_traveled">Distance traveled (with ball): </span>
        <span class="summary-distance-value">0 (0)</span>
      </label>

      <label>
        <span class="summary-marked-label summary-label" data-i18n="time_marked">Time marked Team has ball Yes - No: </span>
        <span class="summary-marked-value">0% - 0%</span>
      </label>

      <label>
        <span class="summary-control-label summary-label" data-i18n="ball_controlled">Ball Controled - Intercepted: </span>
        <span class="summary-control-value">0 - 0</span>
      </label>

      <label>
        <span class="summary-pass-label summary-label" data-i18n="passes_made">Passes made (achieved): </span>
        <span class="summary-pass-value">0 (0)</span>
      </label>

      <label>
        <span class="summary-shoot-label summary-label" data-i18n="shoots_made">Shoots made (goals): </span>
        <span class="summary-shoot-value">0 (0)</span>
      </label>

      <label>
        <span class="summary-challenged-label summary-label" data-i18n="challenged_balls">Challenged balls I has it - Rival has it: </span>
        <span class="summary-challenged-value">0 - 0</span>
      </label>

      <label>
        <span class="summary-steal-label summary-label" data-i18n="takeoff_balls">Take off balls (stealed): </span>
        <span class="summary-steal-value">0 (0)</span>
      </label>

      <label>
        <span class="summary-dribbled-label summary-label" data-i18n="dribbled_balls">Dribbled balls Successful - Failed: </span>
        <span class="summary-dribbled-value">0 - 0</span>
      </label>

    </div>
  </template>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
